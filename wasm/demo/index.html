<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAEO Interactive Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; color: #4CAF50; }
    .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .controls button { padding: 8px 20px; border: 2px solid #4CAF50; background: transparent; color: #4CAF50; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .controls button:hover { background: #4CAF50; color: white; }
    .controls button.active { background: #4CAF50; color: white; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; }
    #status.loading { background: #2a2a4e; color: #aaa; }
    #status.ready { background: #1b3a1b; color: #4CAF50; }
    #status.error { background: #3a1b1b; color: #E91E63; }
    #results { max-width: 1200px; margin: 0 auto; }
    .result-card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .result-card h2 { color: #90CAF9; margin-bottom: 12px; }
    .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat { background: #1a1a2e; padding: 10px 16px; border-radius: 8px; }
    .stat .label { font-size: 11px; color: #888; text-transform: uppercase; }
    .stat .value { font-size: 20px; font-weight: 700; color: #4CAF50; }
    #output-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    #output-table th { text-align: left; padding: 8px; color: #888; border-bottom: 1px solid #333; }
    #output-table td { padding: 8px; border-bottom: 1px solid #222; }
    .forecast-container { background: #0d1117; border-radius: 8px; padding: 16px; overflow-x: auto; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #444; border-top-color: #4CAF50; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>⚡ HAEO Interactive Demo</h1>
  <p style="text-align:center;color:#888;margin-bottom:20px">
    Home Assistant Energy Optimizer — running entirely in your browser via WebAssembly
  </p>

  <div id="status" class="loading">
    <span class="spinner"></span> Loading Pyodide + HiGHS solver...
  </div>

  <div class="controls" id="scenario-buttons"></div>

  <div id="results"></div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js"></script>
  <script>
    let pyodide = null;
    let initialized = false;

    const SCENARIOS_BASE = "https://raw.githubusercontent.com/hass-energy/haeo/main/tests/scenarios";
    const HAEO_CORE_WHL = "./haeo_core-0.4.0-py3-none-any.whl";
    const HIGHSPY_WHL = "./highspy-1.14.0-cp312-cp312-pyodide_2024_0_wasm32.whl";

    async function init() {
      const status = document.getElementById("status");
      try {
        status.innerHTML = '<span class="spinner"></span> Loading Pyodide runtime...';
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");

        status.innerHTML = '<span class="spinner"></span> Installing HiGHS solver + HAEO core...';
        await pyodide.runPythonAsync(`
import micropip
await micropip.install("numpy")
await micropip.install("typing-extensions")
await micropip.install("${HIGHSPY_WHL}")
await micropip.install("${HAEO_CORE_WHL}", deps=False)
`);

        // Install the solver script
        await pyodide.runPythonAsync(SOLVER_SCRIPT);

        initialized = true;
        status.className = "ready";
        status.textContent = "✅ Ready — select a scenario to optimize";

        // Enable buttons
        document.querySelectorAll(".controls button").forEach(b => b.disabled = false);
      } catch (e) {
        status.className = "error";
        status.textContent = "❌ Failed to load: " + (e.message || e);
        console.error(e);
      }
    }

    async function runScenario(num) {
      if (!initialized) return;
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      // Update button states
      document.querySelectorAll(".controls button").forEach(b => {
        b.classList.toggle("active", b.dataset.scenario === String(num));
        b.disabled = true;
      });

      status.className = "loading";
      status.innerHTML = `<span class="spinner"></span> Loading scenario ${num} data...`;

      try {
        // Fetch scenario data
        const [config, inputs, env] = await Promise.all([
          fetch(`${SCENARIOS_BASE}/scenario${num}/config.json`).then(r => r.text()),
          fetch(`${SCENARIOS_BASE}/scenario${num}/inputs.json`).then(r => r.text()),
          fetch(`${SCENARIOS_BASE}/scenario${num}/environment.json`).then(r => r.text()),
        ]);

        pyodide.globals.set("cfg_json", config);
        pyodide.globals.set("inp_json", inputs);
        pyodide.globals.set("env_json", env);

        status.innerHTML = `<span class="spinner"></span> Optimizing scenario ${num}...`;
        const t0 = performance.now();

        const resultJson = await pyodide.runPythonAsync(`solve_scenario(cfg_json, inp_json, env_json)`);
        const result = JSON.parse(resultJson);
        const elapsed = ((performance.now() - t0) / 1000).toFixed(2);

        status.className = "ready";
        status.textContent = `✅ Scenario ${num} solved in ${elapsed}s`;

        // Render results
        results.innerHTML = `
          <div class="result-card">
            <h2>Scenario ${num} Results</h2>
            <div class="stats">
              <div class="stat">
                <div class="label">Objective</div>
                <div class="value">$${result.objective.toFixed(2)}</div>
              </div>
              <div class="stat">
                <div class="label">Elements</div>
                <div class="value">${result.elements}</div>
              </div>
              <div class="stat">
                <div class="label">Periods</div>
                <div class="value">${result.periods}</div>
              </div>
              <div class="stat">
                <div class="label">Solve Time</div>
                <div class="value">${elapsed}s</div>
              </div>
            </div>
            <h3 style="color:#90CAF9;margin-bottom:8px">Element Outputs</h3>
            <div style="max-height:400px;overflow-y:auto">
              <table id="output-table">
                <thead><tr><th>Element</th><th>Output</th><th>Value</th></tr></thead>
                <tbody>
                  ${result.outputs.map(o =>
                    `<tr><td>${o.element}</td><td>${o.name}</td><td>${o.value}</td></tr>`
                  ).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      } catch (e) {
        status.className = "error";
        status.textContent = "❌ Error: " + (e.message?.split("\n").pop() || e);
        console.error(e);
      }

      document.querySelectorAll(".controls button").forEach(b => b.disabled = false);
    }

    // Python solver script
    const SOLVER_SCRIPT = `
import json
from datetime import datetime
import numpy as np

from custom_components.haeo.core.model.network import Network
from custom_components.haeo.core.data.forecast_times import tiers_to_periods_seconds, generate_forecast_timestamps
from custom_components.haeo.core.data.loader.config_loader import load_element_configs
from custom_components.haeo.core.adapters.registry import collect_model_elements
from custom_components.haeo.core.adapters.policy_compilation import compile_policies
from custom_components.haeo.core.schema.elements.element_type import ElementType

class _S:
    def __init__(self, d):
        self._d = d
    @property
    def entity_id(self): return self._d.get("entity_id", "")
    @property
    def state(self): return self._d.get("state", "")
    @property
    def attributes(self): return self._d.get("attributes", {})
    def as_dict(self): return self._d

class _SM:
    def __init__(self, data):
        self._s = {k: _S(v) for k, v in data.items()}
    def get(self, eid): return self._s.get(eid)

def solve_scenario(cfg_json, inp_json, env_json):
    cfg = json.loads(cfg_json)
    inp = {e["entity_id"]: e for e in json.loads(inp_json)}
    env = json.loads(env_json)

    frozen = datetime.fromisoformat(env["optimization_start_time"])
    ps = tiers_to_periods_seconds(cfg, start_time=frozen)
    ph = np.asarray(ps, dtype=float) / 3600
    ft = generate_forecast_timestamps(ps, start_time=frozen.timestamp())

    lc = load_element_configs(cfg["participants"], _SM(inp), ft)
    net = Network(name="browser", periods=ph)
    me = list(collect_model_elements(lc))

    pr = []
    for n, c in lc.items():
        if c.get("element_type") == ElementType.POLICY:
            from custom_components.haeo.core.adapters.elements.policy import extract_policy_rules
            pr.extend(extract_policy_rules(c))

    comp = compile_policies(me, pr)
    for e in comp["elements"]:
        net.add(e)

    obj = net.optimize()

    # Collect outputs
    outputs = []
    for name, element in sorted(net.elements.items()):
        for oname in sorted(element.output_names):
            method = getattr(element, oname, None)
            if callable(method):
                try:
                    val = method()
                    if hasattr(val, "state"):
                        state = val.state
                        if isinstance(state, (list, np.ndarray)):
                            state = f"[{len(state)} values]"
                        elif isinstance(state, float):
                            state = f"{state:.4f}"
                        outputs.append({"element": name, "name": oname, "value": str(state)})
                except Exception:
                    pass

    return json.dumps({
        "objective": obj,
        "elements": len(net.elements),
        "periods": len(ph),
        "outputs": outputs
    })

print("Solver ready")
`;

    // Create scenario buttons
    const btnContainer = document.getElementById("scenario-buttons");
    for (let i = 1; i <= 6; i++) {
      const btn = document.createElement("button");
      btn.textContent = `Scenario ${i}`;
      btn.dataset.scenario = String(i);
      btn.disabled = true;
      btn.onclick = () => runScenario(i);
      btnContainer.appendChild(btn);
    }

    init();
  </script>
</body>
</html>
